name: Deploy GitHub Pages

# Only used if the repository's Pages source is set to "GitHub Actions"
# (Settings -> Pages -> Build and deployment -> Source). If the source is
# set to "Deploy from a branch" instead (the default recommendation in
# docs/GITHUB_PAGES.md for this project, since the site is plain static
# HTML/CSS/JS with no build step), this workflow is not used at all and
# can be safely ignored or removed.
#
# Node.js 20 deprecation note (as of 2026-07): the official actions below
# are pinned to their latest major-version tags on purpose. GitHub pushes
# Node 24 runtime support to these tags automatically as action maintainers
# update them -- pinning to a major tag (not a fixed SHA) is the current
# recommended mitigation. Node 20 is fully removed from Actions runners on
# 2026-09-16; if this workflow starts failing after that date, the fix is
# to bump the version tags below to whatever is current, not to change
# the workflow logic itself.

on:
  push:
    branches: ["main"]
    paths: ["docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
